<!DOCTYPE html>
<html lang="pl-PL">
<head>
    <meta charset="UTF-8">
    <title>Patej Z40_JS</title>
</head>
<body>

<div style="color:red; font-size:50px;">
    <script language="JavaScript">
        document.write("wykonał Joachim Patej<br>");

        var x = prompt("Podaj argument x=", "");
        var x_pat = parseFloat(x);

        document.write("czytany argument x=" + x_pat.toFixed(2) + "<br>");

        function f_pat(x_pat) {
            // Implementacja nowej funkcji klamerkowej
            if (x_pat >= 2) {
                return 9;
            } else if (x_pat >= 0 && x_pat < 2) { // Zgodnie z obrazkiem to [0; 2), bo x=2 jest już w pierwszym warunku
                return Math.pow(x_pat, 3) + 1;
            } else if (x_pat > -2 && x_pat < 0) {
                return Math.pow(x_pat + 1, 2);
            } else if (x_pat <= -2) {
                return 1;
            }
            
        }

        var wynik = f_pat(x_pat);
        document.write("f(" + x_pat.toFixed(2) + ")=" + wynik.toFixed(2) + "<br>");
    </script>
</div>

</body>
</html>
<!-- Patej Z40_JS -->
