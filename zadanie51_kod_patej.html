<textarea rows="30" cols="30">
<html>
<body>
<div style="color:red;font-size:50px;">
<script>
silnia_koniec=parseFloat(prompt("z czego silnia",""));
if(silnia_koniec==0){silnia_pat=1;}
else
{var silnia_pat=1;
for(i=1;i<=silnia_koniec;i++){
silnia_pat=silnia_pat*i;
}
}
document.write(silnia_koniec+"!="+silnia_pat);
</script>
</div>
</body>
</html>
</textarea>
